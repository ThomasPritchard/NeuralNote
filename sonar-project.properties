# SonarQube project config for NeuralNote. Run from the repo root with:
#   export SONAR_HOST_URL=<your self-hosted instance>   # not committed
#   export SONAR_TOKEN=<a project-analysis token>        # never paste in chat
#   sonar-scanner
# (host URL + token come from the environment; nothing secret lives in this file.)

sonar.projectKey=NeuralNote
sonar.projectName=NeuralNote
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Analyse the shipping app only: React/TS client, Tauri shell, and the Rust core.
sonar.sources=app/desktop/src,app/desktop/src-tauri/src,crates/neuralnote-core/src

# Co-located test files are tests, not product code.
sonar.tests=app/desktop/src,crates/neuralnote-core/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Keep the throwaway prototype, build output, deps, generated, and entry/config
# files out of analysis and coverage.
sonar.exclusions=prototype/**,**/dist/**,**/node_modules/**,target/**,**/*.d.ts,app/desktop/src/main.tsx,**/coverage/**,app/desktop/src/e2e/**,app/desktop/e2e-native/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,app/desktop/src/test/**,app/desktop/src/main.tsx,app/desktop/src/e2e/**

# Coverage reports (generated before the scan — see scripts below):
#   frontend: cd app/desktop && npm run coverage   -> app/desktop/coverage/lcov.info
#   rust:     cargo llvm-cov -p neuralnote-core --lcov --output-path lcov-rust.info
sonar.javascript.lcov.reportPaths=app/desktop/coverage/lcov.info
sonar.rust.lcov.reportPaths=lcov-rust.info

# Reconcile two of the project's own rules. docs/definition-of-done.md
# (Housekeeping) REQUIRES deferred work to be recorded as a greppable
# `TODO(<context>)` marker at the code site, never only in a doc that rots — and
# DoD §1 also requires the Sonar gate at new_violations=0. Sonar's S1135
# ("complete this TODO") flags every such marker, so the convention the project
# mandates would always fail the gate the project mandates. Disable S1135 here
# (in-repo, so it is portable to CI or a fresh Sonar and needs no admin token),
# not via a server-side profile edit. The markers stay in code where the DoD
# wants them; Sonar just stops counting them.
sonar.issue.ignore.multicriteria=todoConventionTs,todoConventionRust
sonar.issue.ignore.multicriteria.todoConventionTs.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.todoConventionTs.resourceKey=**/*
sonar.issue.ignore.multicriteria.todoConventionRust.ruleKey=rust:S1135
sonar.issue.ignore.multicriteria.todoConventionRust.resourceKey=**/*
