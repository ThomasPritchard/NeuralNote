[package]
name = "neuralnote-core"
version = "0.1.0"
edition = "2021"
description = "Client-agnostic vault domain for NeuralNote: tree scan, markdown + YAML frontmatter, file/folder CRUD, recent vaults, and path safety. No client/UI dependency."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Maintained drop-in fork of the now-deprecated/archived serde_yaml (PA-006):
# parses untrusted frontmatter, so it must keep getting security fixes.
serde_yaml_ng = "0.10"
# Logging facade only (no logger backend) so the core can warn on tolerated
# faults; the host app installs the actual logger (tauri-plugin-log).
log = "0.4"
trash = "5"

[dev-dependencies]
tempfile = "3"
