name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets / Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Install checksum-verified Gitleaks 8.30.1
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks_8.30.1_linux_x64.tar.gz"
          curl -fsSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            -o "$archive"
          printf '%s  %s\n' \
            '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb' \
            "$archive" | sha256sum --check --status
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks

      - name: Scan all Git history
        run: |
          "$RUNNER_TEMP/gitleaks" git . --log-opts=--all --redact --no-banner

  frontend:
    name: Frontend / Node ${{ matrix.node }} / lint, types, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Check out source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json

      - name: Validate release workflow contract
        run: node scripts/check-release-workflow.mjs

      - name: Install locked dependencies
        working-directory: app/desktop
        run: npm ci

      - name: Lint
        working-directory: app/desktop
        run: npm run lint

      - name: Type check
        working-directory: app/desktop
        run: npm run typecheck

      - name: Type check real-browser specs
        working-directory: app/desktop
        run: npm run typecheck:browser

      - name: Unit and component tests
        working-directory: app/desktop
        run: npm run test:unit

      # Tier-1.5 real-browser hit test (issue #30): runs the titlebar in headless
      # Chromium so CSS stacking / pointer interception is exercised for real —
      # the drag-layer regression jsdom can't see. Node 24 only (one Chromium
      # download); runs on PRs too, since its job is to block the regression
      # before merge, not just on main.
      - name: Install Playwright Chromium
        if: matrix.node == 24
        working-directory: app/desktop
        run: npx playwright install --with-deps chromium

      - name: Real-browser titlebar hit test
        if: matrix.node == 24
        working-directory: app/desktop
        run: npm run test:browser

      - name: Full test suite and 90 percent line coverage
        if: github.event_name != 'pull_request' && matrix.node == 24
        working-directory: app/desktop
        run: npm run coverage

      - name: Production build
        if: github.event_name != 'pull_request' && matrix.node == 24
        working-directory: app/desktop
        run: npm run build

      - name: Audit high-severity npm vulnerabilities
        if: github.event_name != 'pull_request' && matrix.node == 24
        working-directory: app/desktop
        run: npm run audit:all

  rust:
    name: Rust / test, lint, format, and bindings
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Rust-only gates do not package or exercise the local-AI sidecars. Without
    # this merge patch, tauri-build rejects clean runners before tests can start.
    env:
      TAURI_CONFIG: '{"bundle":{"externalBin":[],"resources":[]}}'
    steps:
      - name: Check out source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust 1.96
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          components: clippy,rustfmt,llvm-tools-preview

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: "."

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Check generated TypeScript bindings
        run: npm --prefix app/desktop run check:bindings

      - name: Install pinned main-branch gate tools
        if: github.event_name != 'pull_request'
        run: |
          cargo install cargo-llvm-cov --locked --version 0.8.7
          cargo install cargo-audit --locked --version 0.22.2

      - name: Enforce 90 percent Rust line coverage
        if: github.event_name != 'pull_request'
        run: cargo llvm-cov -p neuralnote-core --fail-under-lines 90 --lcov --output-path lcov-rust.info

      - name: Audit Rust dependencies
        if: github.event_name != 'pull_request'
        run: cargo audit
