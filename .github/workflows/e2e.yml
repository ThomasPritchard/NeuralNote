# Tier-2 native end-to-end tests: drive the real NeuralNote window via
# WebdriverIO + tauri-driver. Linux + Windows ONLY — tauri-driver has no macOS
# WebDriver, so the Mac path is covered by the Tier-1 mockIPC suite
# (app/desktop: `npm run test:e2e`), which runs in the main-branch frontend job.
#
# Mirrors the official Tauri WebDriver CI pattern:
# https://v2.tauri.app/develop/tests/webdriver/ci

name: e2e-native

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-native-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: this post-merge workflow only builds and drives the app, so it
# needs no write scopes.
permissions:
  contents: read

jobs:
  webdriver:
    name: WebdriverIO (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    steps:
      # Immutable action pins prevent a moved tag from changing privileged CI code.
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      # WebKitWebDriver + the GTK/webkit build deps + a virtual display.
      - name: Tauri + WebDriver system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      # Edge WebView2 driver (msedgedriver), put on PATH for tauri-driver.
      - name: Install msedgedriver (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cargo install --locked --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          "$PWD" >> $env:GITHUB_PATH

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Single workspace at the repo root (crates/* + app/desktop/src-tauri).
          workspaces: "."

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json

      - name: Install desktop app dependencies
        working-directory: app/desktop
        run: npm ci

      - name: Install e2e-native dependencies
        working-directory: app/desktop/e2e-native
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked --version 2.0.6

      # wdio's onPrepare runs `tauri build --debug --no-bundle` before the session.
      - name: WebdriverIO (Linux, headless via xvfb)
        if: matrix.platform == 'ubuntu-latest'
        working-directory: app/desktop/e2e-native
        run: xvfb-run --auto-servernum npm test

      - name: WebdriverIO (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: app/desktop/e2e-native
        run: npm test
